<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MILUCHAT</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif; }
        :root {
            --bg-dark: #1a1e24;
            --bg-sidebar: #22262e;
            --bg-chat: #2a2f38;
            --text-primary: #e1e9f0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #3a4050;
            --bubble-own: #3b82f6;
            --bubble-other: #323842;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }
        body { background: var(--bg-dark); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 0; overflow: hidden; }
        
        .welcome-screen {
            background: var(--bg-sidebar);
            max-width: 400px;
            width: 90%;
            padding: 1.5rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        .welcome-screen select, .welcome-screen input, .welcome-screen button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            background: var(--bg-chat);
            color: var(--text-primary);
            font-size: 16px;
        }
        .welcome-screen button { background: var(--accent); cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .welcome-screen button:hover { background: var(--accent-hover); }
        .terms-box { font-size: 0.75rem; margin: 10px 0; text-align: left; max-height: 130px; overflow-y: auto; background: var(--bg-chat); padding: 8px; border-radius: 12px; }
        
        .chat-app { display: none; width: 100%; height: 100vh; background: var(--bg-sidebar); position: fixed; top: 0; left: 0; }
        .app-grid { display: grid; grid-template-columns: 260px 1fr 260px; height: 100%; transition: all 0.3s; }
        
        .left-panel { background: #1a1e24; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
        .my-info { padding: 16px; text-align: center; border-bottom: 1px solid var(--border); }
        .my-coins { font-size: 1.4rem; color: gold; margin: 8px 0; }
        .btn-sm { background: var(--warning); border: none; padding: 8px; border-radius: 40px; color: white; cursor: pointer; width: 100%; margin-top: 6px; font-size: 14px; transition: opacity 0.2s; }
        .btn-sm:active { opacity: 0.8; }
        .online-users { padding: 12px; }
        .user-online { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 40px; background: var(--bg-chat); margin: 6px 0; cursor: pointer; transition: background 0.2s; }
        .user-online:active { background: var(--border); }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; display: inline-block; }
        
        .center-area { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); overflow: hidden; }
        .chat-column, .wall-column { background: var(--bg-chat); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 12px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); font-weight: bold; }
        .messages-container { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        
        .emoji-row { display: flex; gap: 6px; padding: 6px 12px; background: var(--bg-sidebar); overflow-x: auto; }
        .emoji-item { font-size: 1.2rem; cursor: pointer; padding: 4px; transition: transform 0.1s; }
        .emoji-item:active { transform: scale(1.2); }
        
        .input-fixed { padding: 8px 12px; background: var(--bg-sidebar); display: flex; gap: 8px; border-top: 1px solid var(--border); }
        .input-fixed textarea { flex: 1; border: none; border-radius: 20px; padding: 10px; background: var(--bg-chat); color: var(--text-primary); resize: none; font-size: 16px; }
        .input-fixed button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 20px; color: white; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .input-fixed button:active { background: var(--accent-hover); }
        
        .media-wall { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .media-post { background: var(--bg-sidebar); border-radius: 16px; padding: 8px; }
        .media-post img, .media-post video { max-width: 100%; border-radius: 12px; max-height: 200px; width: auto; }
        
        .message { display: flex; flex-direction: column; max-width: 80%; animation: fadeIn 0.2s; }
        .message.own { align-self: flex-end; }
        .message-bubble { padding: 8px 14px; border-radius: 18px; background: var(--bubble-other); color: var(--text-primary); word-break: break-word; font-size: 15px; }
        .message.own .message-bubble { background: var(--bubble-own); }
        .message-info { font-size: 0.65rem; color: #8a98a9; margin: 2px 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .delete-msg { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.7rem; margin-left: 8px; padding: 2px 4px; }
        .system-message { text-align: center; font-size: 0.7rem; background: #2a2f38; padding: 4px; border-radius: 20px; width: fit-content; margin: 4px auto; color: #8a98a9; }
        
        .floating-chat { position: fixed; bottom: 20px; right: 20px; width: 340px; height: 480px; background: var(--bg-sidebar); border-radius: 16px; display: flex; flex-direction: column; z-index: 1000; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .floating-header { background: var(--accent); padding: 10px; border-radius: 16px 16px 0 0; display: flex; justify-content: space-between; cursor: move; color: white; }
        .floating-header button { background: none; border: none; color: white; cursor: pointer; font-size: 16px; padding: 0 5px; }
        .floating-messages { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
        .floating-emoji-row { display: flex; gap: 6px; padding: 6px; overflow-x: auto; background: var(--bg-sidebar); }
        .floating-input-wrapper { display: flex; gap: 6px; padding: 6px; background: var(--bg-sidebar); }
        .floating-input-wrapper input { flex: 1; padding: 10px; border-radius: 20px; border: none; background: var(--bg-chat); color: var(--text-primary); font-size: 14px; }
        .floating-input-wrapper button { background: var(--accent); border: none; padding: 8px 16px; border-radius: 20px; color: white; cursor: pointer; }
        .minimized { height: 45px !important; min-height: 45px !important; }
        .minimized .floating-messages, .minimized .floating-emoji-row, .minimized .floating-input-wrapper { display: none; }
        
        .right-panel { background: var(--bg-sidebar); border-left: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .admin-panel { background: #1e293b; border-radius: 12px; padding: 12px; margin-top: 12px; }
        
        .call-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(8px);
        }
        .call-container {
            background: #1a1e24;
            border-radius: 24px;
            padding: 20px;
            max-width: 95%;
            width: 800px;
            position: relative;
        }
        .videos-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
        }
        .call-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .call-controls button {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .call-controls button:active { transform: scale(0.95); }
        .end-call-btn { background: var(--danger); color: white; }
        .timer { text-align: center; color: white; font-size: 18px; margin-top: 15px; font-family: monospace; }
        
        .mobile-header {
            display: none;
            background: var(--bg-sidebar);
            padding: 12px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .hamburger-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 44px;
            height: 44px;
        }
        .mobile-menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .mobile-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 260px;
            height: 100%;
            background: var(--bg-sidebar);
            z-index: 1001;
            transition: left 0.3s;
            overflow-y: auto;
        }
        .mobile-menu.open { left: 0; }
        
        @media (max-width: 800px) {
            .mobile-header { display: flex; align-items: center; gap: 12px; }
            .chat-app { padding-top: 60px; }
            .app-grid { display: block; }
            .left-panel, .right-panel { display: none; position: fixed; top: 60px; bottom: 0; width: 260px; z-index: 99; }
            .left-panel { left: 0; }
            .right-panel { right: 0; }
            .center-area { grid-template-columns: 1fr; height: calc(100vh - 60px); }
            .chat-column, .wall-column { height: 50vh; }
            .message { max-width: 85%; }
            .input-fixed textarea { font-size: 16px; }
            .input-fixed button { padding: 8px 16px; min-width: 60px; }
            .floating-chat { width: 95%; right: 2.5%; left: 2.5%; bottom: 10px; height: 70vh; }
            .videos-container { grid-template-columns: 1fr; gap: 10px; }
            .video-wrapper { aspect-ratio: 16/9; }
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<script>
    // Traducciones completas para todos los idiomas soportados
    const translations = {
        es: { welcomeTitle:"MILUCHAT", acceptTerms:"Acepto los términos", joinBtn:"Ingresar", requestCoins:"➕ Pedir monedas", changeLang:"🌐 Cambiar idioma", onlineUsers:"📡 En línea", globalChat:"💬 Chat Global", send:"Enviar", call:"📹", wall:"📸 Muro (sube fotos/videos)", upload:"📤 Subir", logout:"🚪 Cerrar sesión", admin:"🔐 Admin", terms:"📜 Términos y condiciones\n1. Aceptas las reglas de convivencia.\n2. El contenido subido expira en 12h.\n3. Las monedas se ganan con likes.\n4. Las videollamadas consumen monedas.", usernamePlaceholder:"Nombre de usuario" },
        en: { welcomeTitle:"MILUCHAT", acceptTerms:"I accept the terms", joinBtn:"Login", requestCoins:"➕ Request coins", changeLang:"🌐 Change language", onlineUsers:"📡 Online", globalChat:"💬 Global Chat", send:"Send", call:"📹", wall:"📸 Wall (upload photos/videos)", upload:"📤 Upload", logout:"🚪 Logout", admin:"🔐 Admin", terms:"📜 Terms and conditions\n1. You accept coexistence rules.\n2. Uploaded content expires in 12h.\n3. Coins are earned with likes.\n4. Video calls consume coins.", usernamePlaceholder:"Username" },
        fr: { welcomeTitle:"MILUCHAT", acceptTerms:"J'accepte les conditions", joinBtn:"Connexion", requestCoins:"➕ Demander des pièces", changeLang:"🌐 Changer de langue", onlineUsers:"📡 En ligne", globalChat:"💬 Chat Global", send:"Envoyer", call:"📹", wall:"📸 Mur (publier photos/vidéos)", upload:"📤 Publier", logout:"🚪 Déconnexion", admin:"🔐 Admin", terms:"📜 Conditions générales\n1. Vous acceptez les règles de convivialité.\n2. Le contenu expire après 12h.\n3. Les pièces s'obtiennent avec des likes.\n4. Les appels vidéo consomment des pièces.", usernamePlaceholder:"Nom d'utilisateur" },

        pt: { welcomeTitle:"MILUCHAT", acceptTerms:"Aceito os termos", joinBtn:"Entrar", requestCoins:"➕ Pedir moedas", changeLang:"🌐 Mudar idioma", onlineUsers:"📡 Online", globalChat:"💬 Chat Global", send:"Enviar", call:"📹", wall:"📸 Mural (enviar fotos/vídeos)", upload:"📤 Enviar", logout:"🚪 Sair", admin:"🔐 Admin", terms:"📜 Termos e condições\n1. Aceita as regras de convivência.\n2. O conteúdo expira em 12h.\n3. Moedas são ganhas com likes.\n4. Chamadas de vídeo consomem moedas.", usernamePlaceholder:"Nome de usuário" },
        it: { welcomeTitle:"MILUCHAT", acceptTerms:"Accetto i termini", joinBtn:"Accedi", requestCoins:"➕ Richiedi monete", changeLang:"🌐 Cambia lingua", onlineUsers:"📡 Online", globalChat:"💬 Chat Globale", send:"Invia", call:"📹", wall:"📸 Bacheca (carica foto/video)", upload:"📤 Carica", logout:"🚪 Esci", admin:"🔐 Admin", terms:"📜 Termini e condizioni\n1. Accetti le regole di convivenza.\n2. I contenuti scadono dopo 12 ore.\n3. Le monete si guadagnano con i like.\n4. Le videochiamate consumano monete.", usernamePlaceholder:"Nome utente" },

        ja: { welcomeTitle:"MILUCHAT", acceptTerms:"利用規約に同意する", joinBtn:"ログイン", requestCoins:"➕ コインをリクエスト", changeLang:"🌐 言語変更", onlineUsers:"📡 オンライン", globalChat:"💬 グローバルチャット", send:"送信", call:"📹", wall:"📸 ウォール (写真/動画をアップロード)", upload:"📤 アップロード", logout:"🚪 ログアウト", admin:"🔐 管理者", terms:"📜 利用規約\n1. 共存ルールに同意します。\n2. アップロードされたコンテンツは12時間で期限切れになります。\n3. いいね！でコインを獲得できます。\n4. ビデオ通話にはコインが必要です。", usernamePlaceholder:"ユーザー名" }
    };
    
    let userLanguage = 'es';
    let currentUsername = null;
    let currentRoom = "global";
    let autoScroll = true;
    let floatingWindows = new Map();
    let mediaPosts = [];
    let userCountry = 'COL';
    let isAdmin = false;
    let activeCall = null;
    let peerConnection = null;
    let localStream = null;
    const translationCache = new Map();
    
    const socket = io();
    
    function applyUILanguage(lang) {
        const t = translations[lang] || translations.es;
        const welcomeTitle = document.getElementById('welcomeTitle');
        const acceptTermsLabel = document.getElementById('acceptTermsLabel');
        const joinBtnEl = document.getElementById('joinBtn');
        const requestBtns = document.querySelectorAll('#requestCoinsBtn, #requestCoinsBtn2');
        const langBtns = document.querySelectorAll('#changeLangBtn, #changeLangBtn2');
        const onlineTitles = document.querySelectorAll('.online-users h4');
        const chatHeaders = document.querySelectorAll('.chat-header');
        const sendBtns = document.querySelectorAll('#sendBtn');
        const callBtn = document.getElementById('callGlobalBtn');
        const uploadBtns = document.querySelectorAll('#uploadMediaBtn');
        const logoutBtnsUI = document.querySelectorAll('#logoutBtn, #logoutBtn2');
        const adminBtnsUI = document.querySelectorAll('#adminLoginBtn, #adminLoginBtn2');
        const usernamePlaceholder = document.getElementById('usernameInput');
        const termsBox = document.getElementById('termsBox');
        
        if(welcomeTitle) welcomeTitle.innerText = t.welcomeTitle;
        if(acceptTermsLabel) acceptTermsLabel.innerText = t.acceptTerms;
        if(joinBtnEl) joinBtnEl.innerText = t.joinBtn;
        requestBtns.forEach(btn => { if(btn) btn.innerText = t.requestCoins; });
        langBtns.forEach(btn => { if(btn) btn.innerText = t.changeLang; });
        onlineTitles.forEach(el => { if(el) el.innerText = t.onlineUsers; });
        if(chatHeaders[0]) chatHeaders[0].innerText = t.globalChat;
        if(chatHeaders[1]) chatHeaders[1].innerText = t.wall;
        sendBtns.forEach(btn => { if(btn) btn.innerText = t.send; });
        if(callBtn) callBtn.innerText = t.call;
        uploadBtns.forEach(btn => { if(btn) btn.innerText = t.upload; });
        logoutBtnsUI.forEach(btn => { if(btn) btn.innerText = t.logout; });
        adminBtnsUI.forEach(btn => { if(btn) btn.innerText = t.admin; });
        if(usernamePlaceholder) usernamePlaceholder.placeholder = t.usernamePlaceholder;

    async function translateText(text, targetLang, sourceLang = 'es') {
        if (!text || targetLang === sourceLang) return text;
        const cacheKey = text + '|' + sourceLang + '|' + targetLang;
        if (translationCache.has(cacheKey)) return translationCache.get(cacheKey);
        try {
            // Usar traducción local para inglés ya que la API a veces falla
            if(sourceLang === 'es' && targetLang === 'en') {
                const simpleTranslations = {
                    'hola': 'hello', 'como estas': 'how are you', 'bien': 'good', 'gracias': 'thanks',
                    'adios': 'goodbye', 'que tal': 'what\'s up', 'buenos dias': 'good morning',
                    'buenas noches': 'good night', 'por favor': 'please', 'si': 'yes', 'no': 'no'
                };
                const lowerText = text.toLowerCase();
                for(let [key, value] of Object.entries(simpleTranslations)) {
                    if(lowerText.includes(key)) {
                        const translated = text.toLowerCase().replace(key, value);
                        translationCache.set(cacheKey, translated);
                        return translated;
                    }
                }
            }
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`;
            const res = await fetch(url);
            const data = await res.json();
            let translated = data.responseData.translatedText || text;
            // Limpiar HTML entities
            translated = translated.replace(/&#39;/g, "'").replace(/&quot;/g, '"').replace(/&amp;/g, '&');
            translationCache.set(cacheKey, translated);
            return translated;
        } catch(e) { 
            console.error('Error traduciendo:', e);
            return text; 
        }
    }

    async function startCall(targetUser, durationMinutes, isPrivate = false) {
        socket.emit('check call cost', { durationMinutes }, async (res) => {
            if (!res || !res.canAfford) {
                alert(`Necesitas ${res?.cost || 1.5} monedas para llamar ${durationMinutes} minutos`);
                return;
            }
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                showCallUI(durationMinutes, true, targetUser);
                
                peerConnection = new RTCPeerConnection(configuration);
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit('ice-candidate', { candidate: event.candidate, targetUser });
                    }
                };
                
                peerConnection.ontrack = (event) => {
                    const remoteVideo = document.getElementById('remoteVideo');
                    if (remoteVideo && event.streams[0]) {
                        remoteVideo.srcObject = event.streams[0];
                    }
                };
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                socket.emit('call-offer', { offer, targetUser, durationMinutes });
                
            } catch (err) {
                console.error('Error al iniciar llamada:', err);
                alert('No se pudo acceder a cámara/micrófono. Por favor permite los permisos.');
            }
        });
    }
    
    function showCallUI(durationMinutes, isCaller, otherUser) {
        const existingOverlay = document.querySelector('.call-overlay');
        if (existingOverlay) existingOverlay.remove();
        
        const overlay = document.createElement('div');
        overlay.className = 'call-overlay';
        overlay.innerHTML = `
            <div class="call-container">
                <div class="videos-container">
                    <div class="video-wrapper">
                        <video id="localVideo" autoplay muted playsinline></video>
                        <div class="video-label">Tú</div>
                    </div>
                    <div class="video-wrapper">
                        <video id="remoteVideo" autoplay playsinline></video>
                        <div class="video-label">${escapeHtml(otherUser || 'Esperando...')}</div>
                    </div>
                </div>
                <div class="call-controls">
                    <button id="endCallBtn" class="end-call-btn">📞 Colgar</button>
                </div>
                <div class="timer" id="timerLabel">Duración: 0:00 / ${durationMinutes}:00</div>
            </div>
        `;
        document.body.appendChild(overlay);
        
        if (localStream) {
            const localVideo = document.getElementById('localVideo');
            if (localVideo) localVideo.srcObject = localStream;
        }
        
        let timeLeft = durationMinutes * 60;
        const timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (activeCall) endCall();
            } else {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                const timerSpan = document.getElementById('timerLabel');
                if (timerSpan) timerSpan.innerText = `Duración: ${minutes}:${seconds.toString().padStart(2,'0')} / ${durationMinutes}:00`;
            }
        }, 1000);
        
        const endBtn = document.getElementById('endCallBtn');
        if(endBtn) {
            endBtn.onclick = () => {
                clearInterval(timerInterval);
                endCall();
            };
        }
        
        activeCall = { timerInterval, otherUser };
    }
    
    function endCall() {
        if (activeCall?.timerInterval) clearInterval(activeCall.timerInterval);
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        const overlay = document.querySelector('.call-overlay');
        if (overlay) overlay.remove();
        socket.emit('end-call');
        addSystemMessage('📹 Videollamada finalizada');
        activeCall = null;
    }
    
    // Socket eventos para videollamada
    socket.on('call-offer', async ({ offer, from, durationMinutes }) => {
        const accept = confirm(`${from} te llama por ${durationMinutes} minutos. ¿Aceptar?`);
        if (!accept) {
            socket.emit('call-reject', { from });
            return;
        }
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            showCallUI(durationMinutes, false, from);
            
            peerConnection = new RTCPeerConnection(configuration);
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { candidate: event.candidate, targetUser: from });
                }
            };
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('call-answer', { answer, to: from });
            
        } catch (err) {
            console.error('Error al aceptar llamada:', err);
            alert('No se pudo acceder a cámara/micrófono');
        }

                                    div.style.display = 'block';
                                    div.innerHTML = `
                                        <div style="display:flex; justify-content:space-between;"><h4>Panel Admin</h4><button class="closeAdminBtn">✖</button></div>
                                        <div id="adminRequestsList"></div>
                                        <h5>Dar monedas</h5>
                                        <input type="text" id="adminGiveUser" placeholder="Nombre usuario">
                                        <input type="number" id="adminGiveAmount" min="1" max="12" placeholder="Cantidad">
                                        <button id="adminGiveCoinsBtn">Dar</button>
                                        <h5>Bloquear/Desbloquear</h5>
                                        <input type="text" id="adminBlockUser" placeholder="Nombre usuario">
                                        <button id="adminBlockBtn">Bloquear</button>
                                        <button id="adminUnblockBtn">Desbloquear</button>
                                    `;
                                }
                            });
                            document.querySelectorAll('.closeAdminBtn').forEach(btnClose => {
                                btnClose.onclick = () => {
                                    document.querySelectorAll('#adminPanel, #adminPanel2').forEach(d => { if(d) d.style.display = 'none'; });
                                    isAdmin = false;
                                };
                            });
                            document.querySelectorAll('#adminGiveCoinsBtn').forEach(giveBtn => {
                                giveBtn.onclick = () => {
                                    const target = document.getElementById('adminGiveUser')?.value.trim();
                                    const amount = parseInt(document.getElementById('adminGiveAmount')?.value);
                                    if (target && amount) socket.emit('admin give coins', { targetUsername: target, amount }, (res) => alert(res.success ? 'Monedas enviadas' : res.error));
                                    else alert('Ingresa nombre y cantidad');
                                };
                            });
                            document.querySelectorAll('#adminBlockBtn').forEach(blockBtn => {
                                blockBtn.onclick = () => {
                                    const user = document.getElementById('adminBlockUser')?.value.trim();
                                    if (user) socket.emit('admin toggle block', { targetUsername: user, block: true }, (res) => alert(res.success ? 'Bloqueado' : res.error));
                                };
                            });
                            document.querySelectorAll('#adminUnblockBtn').forEach(unblockBtn => {
                                unblockBtn.onclick = () => {
                                    const user = document.getElementById('adminBlockUser')?.value.trim();
                                    if (user) socket.emit('admin toggle block', { targetUsername: user, block: false }, (res) => alert(res.success ? 'Desbloqueado' : res.error));
                                };
                            });
                            socket.emit('admin pending requests', (requests) => updateAdminRequests(requests));
                            socket.on('admin pending requests', (requests) => updateAdminRequests(requests));
                            socket.on('new coin request', () => socket.emit('admin pending requests', (r) => updateAdminRequests(r)));
                        } else alert('Contraseña incorrecta');
                    });
                }
            };
        }
    });
    
    function updateAdminRequests(requests) {
        const containers = document.querySelectorAll('#adminRequestsList');
        containers.forEach(container => {
            if (!container) return;
            container.innerHTML = '';
            if (!requests || requests.length === 0) { container.innerHTML = '<div>No hay solicitudes</div>'; return; }
            requests.forEach((req, idx) => {
                const div = document.createElement('div');
                div.innerHTML = `${req.from} pide ${req.amount} monedas <button class="admin-give-req" data-idx="${idx}">Dar</button> <button class="admin-deny-req" data-idx="${idx}">Denegar</button>`;
                container.appendChild(div);
            });
            document.querySelectorAll('.admin-give-req').forEach(btn => btn.onclick = () => socket.emit('admin resolve request', { requestIndex: parseInt(btn.dataset.idx), giveCoins: true }));
            document.querySelectorAll('.admin-deny-req').forEach(btn => btn.onclick = () => socket.emit('admin resolve request', { requestIndex: parseInt(btn.dataset.idx), giveCoins: false }));
        });
    }
    
    function joinChat(username, lang, country) {
        socket.emit('set username', { username, language: lang, country }, (success, data) => {
            if (success) {
                currentUsername = username;
                userLanguage = lang;
                userCountry = country;
                localStorage.setItem('miluchat_user', username);
                localStorage.setItem('miluchat_lang', lang);
                localStorage.setItem('miluchat_country', country);
                if(welcomeDiv) welcomeDiv.style.display = 'none';
                if(chatDiv) chatDiv.style.display = 'flex';
                updateCoins(data.coins);
                updateMyName(username);
                addSystemMessage(`✨ Bienvenido ${username}. Tienes ${data.coins} monedas.`);
            } else if(errorMsg) {
                errorMsg.innerText = data;
            }
        });
    }
    
    const savedLang = localStorage.getItem('miluchat_lang');
    if (savedLang && translations[savedLang]) applyUILanguage(savedLang);
    else applyUILanguage('es');
    const savedUser = localStorage.getItem('miluchat_user');
    if (savedUser) {
        userLanguage = localStorage.getItem('miluchat_lang') || 'es';
        userCountry = localStorage.getItem('miluchat_country') || 'COL';
        if(languageSelect) languageSelect.value = userLanguage;
        if(countrySelect) countrySelect.value = userCountry;
        joinChat(savedUser, userLanguage, userCountry);
    }
    if(joinBtn) {
        joinBtn.onclick = () => {
            const name = usernameInput ? usernameInput.value.trim() : '';
            const lang = languageSelect ? languageSelect.value : 'es';
            const country = countrySelect ? countrySelect.value : 'COL';
            if (name && acceptTermsCheck && acceptTermsCheck.checked) joinChat(name, lang, country);
            else if (acceptTermsCheck && !acceptTermsCheck.checked && errorMsg) errorMsg.innerText = 'Acepta los términos';
            else if (!name && errorMsg) errorMsg.innerText = 'Ingresa un nombre';
        };
    }
</script>
</body>
</html>
