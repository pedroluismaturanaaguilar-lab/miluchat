<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MILUCHAT</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI'; }
        :root {
            --bg-dark: #1a1e24;
            --bg-sidebar: #22262e;
            --bg-chat: #2a2f38;
            --text-primary: #e1e9f0;
            --accent: #3b82f6;
            --border: #3a4050;
            --bubble-own: #3b82f6;
            --bubble-other: #323842;
        }
        body { background: var(--bg-dark); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 0; }
        .welcome-screen {
            background: var(--bg-sidebar);
            max-width: 400px;
            width: 90%;
            padding: 1.5rem;
            border-radius: 24px;
            text-align: center;
        }
        .welcome-screen select, .welcome-screen input, .welcome-screen button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            background: var(--bg-chat);
            color: var(--text-primary);
        }
        .welcome-screen button { background: var(--accent); cursor: pointer; font-weight: bold; }
        .terms-box { font-size: 0.75rem; margin: 10px 0; text-align: left; max-height: 130px; overflow-y: auto; background: var(--bg-chat); padding: 8px; border-radius: 12px; }
        .chat-app { display: none; width: 100%; height: 100vh; background: var(--bg-sidebar); position: fixed; top: 0; left: 0; }
        .app-grid { display: grid; grid-template-columns: 260px 1fr 260px; height: 100%; }
        .left-panel { background: #1a1e24; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
        .my-info { padding: 16px; text-align: center; border-bottom: 1px solid var(--border); }
        .my-coins { font-size: 1.4rem; color: gold; margin: 8px 0; }
        .btn-sm { background: #f59e0b; border: none; padding: 6px; border-radius: 40px; color: white; cursor: pointer; width: 100%; margin-top: 6px; }
        .online-users { padding: 12px; }
        .user-online { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 40px; background: var(--bg-chat); margin: 6px 0; cursor: pointer; }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; display: inline-block; }
        .center-area { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); overflow: hidden; }
        .chat-column, .wall-column { background: var(--bg-chat); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 12px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); font-weight: bold; }
        .messages-container { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .emoji-row { display: flex; gap: 6px; padding: 6px 12px; background: var(--bg-sidebar); overflow-x: auto; }
        .emoji-item { font-size: 1.2rem; cursor: pointer; }
        .input-fixed { padding: 8px 12px; background: var(--bg-sidebar); display: flex; gap: 8px; border-top: 1px solid var(--border); }
        .input-fixed textarea { flex: 1; border: none; border-radius: 20px; padding: 8px; background: var(--bg-chat); color: var(--text-primary); resize: none; }
        .input-fixed button { background: var(--accent); border: none; padding: 8px 16px; border-radius: 20px; color: white; cursor: pointer; }
        .media-wall { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .media-post { background: var(--bg-sidebar); border-radius: 16px; padding: 8px; }
        .media-post img, .media-post video { max-width: 100%; border-radius: 12px; max-height: 150px; }
        .message { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn 0.2s; }
        .message.own { align-self: flex-end; }
        .message-bubble { padding: 6px 12px; border-radius: 16px; background: var(--bubble-other); color: var(--text-primary); word-break: break-word; }
        .message.own .message-bubble { background: var(--bubble-own); }
        .message-info { font-size: 0.65rem; color: #8a98a9; margin: 2px 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .delete-msg { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 0.7rem; margin-left: 8px; }
        .system-message { text-align: center; font-size: 0.7rem; background: #2a2f38; padding: 4px; border-radius: 20px; width: fit-content; margin: 4px auto; color: #8a98a9; }
        .floating-chat { position: fixed; bottom: 20px; right: 20px; width: 340px; height: 480px; background: var(--bg-sidebar); border-radius: 16px; display: flex; flex-direction: column; z-index: 1000; border: 1px solid var(--border); }
        .floating-header { background: var(--accent); padding: 8px; border-radius: 16px 16px 0 0; display: flex; justify-content: space-between; cursor: move; color: white; }
        .floating-messages { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
        .floating-emoji-row { display: flex; gap: 6px; padding: 6px; overflow-x: auto; background: var(--bg-sidebar); }
        .floating-input-wrapper { display: flex; gap: 6px; padding: 6px; background: var(--bg-sidebar); }
        .floating-input-wrapper input { flex: 1; padding: 6px; border-radius: 20px; border: none; background: var(--bg-chat); color: var(--text-primary); }
        .floating-input-wrapper button { background: var(--accent); border: none; padding: 6px 12px; border-radius: 20px; color: white; cursor: pointer; }
        .minimized { height: 40px !important; min-height: 40px !important; }
        .minimized .floating-messages, .minimized .floating-emoji-row, .minimized .floating-input-wrapper { display: none; }
        .right-panel { background: var(--bg-sidebar); border-left: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .admin-panel { background: #1e293b; border-radius: 12px; padding: 12px; margin-top: 12px; }
        /* Estilos para la videollamada */
        .call-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .call-video {
            background: black;
            border-radius: 20px;
            width: 80%;
            max-width: 600px;
            margin: 10px;
        }
        video { width: 100%; border-radius: 20px; background: #000; }
        .call-controls { margin-top: 20px; }
        @media (max-width: 800px) { .app-grid { grid-template-columns: 1fr; } .left-panel, .right-panel { display: none; } .center-area { grid-template-columns: 1fr; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
<div id="welcomeScreen" class="welcome-screen">
    <h1 id="welcomeTitle">MILUCHAT</h1>
    <select id="languageSelect">
        <option value="es">Español</option><option value="en">English</option><option value="fr">Français</option>
        <option value="de">Deutsch</option><option value="pt">Português</option><option value="it">Italiano</option>
        <option value="zh">中文</option><option value="ja">日本語</option>
    </select>
    <select id="countrySelect">
        <option value="COL">Colombia</option><option value="USA">Estados Unidos</option><option value="MEX">México</option>
        <option value="ESP">España</option><option value="ARG">Argentina</option><option value="CHL">Chile</option>
    </select>
    <input type="text" id="usernameInput" placeholder="Nombre de usuario">
    <div class="terms-box" id="termsBox"></div>
    <label><input type="checkbox" id="acceptTerms"> <span id="acceptTermsLabel">Acepto los términos</span></label>
    <button id="joinBtn">Ingresar</button>
    <div id="errorMsg" style="color:#ef4444; margin-top:8px;"></div>
</div>
<div id="chatApp" class="chat-app">
    <div class="app-grid">
        <div class="left-panel">
            <div class="my-info">
                <h3 id="myName">-</h3>
                <div class="my-coins">💰 <span id="myCoins">0</span></div>
                <button id="requestCoinsBtn" class="btn-sm" data-i18n="requestCoins">➕ Pedir monedas</button>
                <button id="changeLangBtn" class="btn-sm" data-i18n="changeLang">🌐 Cambiar idioma</button>
            </div>
            <div class="online-users">
                <h4 data-i18n="onlineUsers">📡 En línea</h4>
                <div id="usersList"></div>
            </div>
        </div>
        <div class="center-area">
            <div class="chat-column">
                <div class="chat-header" data-i18n="globalChat">💬 Chat Global</div>
                <div id="messagesContainer" class="messages-container"></div>
                <div class="emoji-row" id="emojiRow"></div>
                <div class="input-fixed">
                    <textarea id="messageInput" rows="1" placeholder="Mensaje..."></textarea>
                    <button id="sendBtn" data-i18n="send">Enviar</button>
                    <button id="callGlobalBtn" style="background:#10b981;" data-i18n="call">📹</button>
                </div>
            </div>
            <div class="wall-column">
                <div class="chat-header" data-i18n="wall">📸 Muro (sube fotos/videos)</div>
                <div id="mediaWall" class="media-wall"></div>
                <div class="input-fixed">
                    <button id="uploadMediaBtn" style="background:#f59e0b;" data-i18n="upload">📤 Subir</button>
                    <input type="file" id="mediaFileInput" accept="image/*,video/*" style="display:none">
                </div>
            </div>
        </div>
        <div class="right-panel">
            <button id="logoutBtn" style="background:#ef4444; padding:8px; border-radius:12px; border:none; color:white;" data-i18n="logout">🚪 Cerrar sesión</button>
            <button id="adminLoginBtn" style="background:#8b5cf6;" data-i18n="admin">🔐 Admin</button>
            <div id="adminPanel" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
    // Traducciones de la interfaz (objeto completo, igual que antes)
    const translations = {
        es: { welcomeTitle:"MILUCHAT", acceptTerms:"Acepto los términos", joinBtn:"Ingresar", requestCoins:"➕ Pedir monedas", changeLang:"🌐 Cambiar idioma", onlineUsers:"📡 En línea", globalChat:"💬 Chat Global", send:"Enviar", call:"📹", wall:"📸 Muro (sube fotos/videos)", upload:"📤 Subir", logout:"🚪 Cerrar sesión", admin:"🔐 Admin", terms:"📜 Términos y condiciones\n1. Aceptas las reglas de convivencia.\n2. El contenido subido expira en 12h.\n3. Las monedas se ganan con likes.\n4. Las videollamadas consumen monedas.", usernamePlaceholder:"Nombre de usuario" },
        en: { welcomeTitle:"MILUCHAT", acceptTerms:"I accept the terms", joinBtn:"Login", requestCoins:"➕ Request coins", changeLang:"🌐 Change language", onlineUsers:"📡 Online", globalChat:"💬 Global Chat", send:"Send", call:"📹", wall:"📸 Wall (upload photos/videos)", upload:"📤 Upload", logout:"🚪 Logout", admin:"🔐 Admin", terms:"📜 Terms and conditions\n1. You accept coexistence rules.\n2. Uploaded content expires in 12h.\n3. Coins are earned with likes.\n4. Video calls consume coins.", usernamePlaceholder:"Username" },
        fr: { welcomeTitle:"MILUCHAT", acceptTerms:"J'accepte les conditions", joinBtn:"Connexion", requestCoins:"➕ Demander des pièces", changeLang:"🌐 Changer de langue", onlineUsers:"📡 En ligne", globalChat:"💬 Chat Global", send:"Envoyer", call:"📹", wall:"📸 Mur (publier photos/vidéos)", upload:"📤 Publier", logout:"🚪 Déconnexion", admin:"🔐 Admin", terms:"📜 Conditions générales\n1. Vous acceptez les règles de convivialité.\n2. Le contenu expire après 12h.\n3. Les pièces s'obtiennent avec des likes.\n4. Les appels vidéo consomment des pièces.", usernamePlaceholder:"Nom d'utilisateur" },
        de: { welcomeTitle:"MILUCHAT", acceptTerms:"Ich akzeptiere die Bedingungen", joinBtn:"Einloggen", requestCoins:"➕ Münzen anfordern", changeLang:"🌐 Sprache ändern", onlineUsers:"📡 Online", globalChat:"💬 Globaler Chat", send:"Senden", call:"📹", wall:"📸 Wand (Fotos/Videos hochladen)", upload:"📤 Hochladen", logout:"🚪 Abmelden", admin:"🔐 Admin", terms:"📜 Allgemeine Geschäftsbedingungen\n1. Sie akzeptieren die Verhaltensregeln.\n2. Hochgeladene Inhalte verfallen nach 12h.\n3. Münzen werden durch Likes verdient.\n4. Videoanrufe verbrauchen Münzen.", usernamePlaceholder:"Benutzername" },
        pt: { welcomeTitle:"MILUCHAT", acceptTerms:"Aceito os termos", joinBtn:"Entrar", requestCoins:"➕ Pedir moedas", changeLang:"🌐 Mudar idioma", onlineUsers:"📡 Online", globalChat:"💬 Chat Global", send:"Enviar", call:"📹", wall:"📸 Mural (enviar fotos/vídeos)", upload:"📤 Enviar", logout:"🚪 Sair", admin:"🔐 Admin", terms:"📜 Termos e condições\n1. Aceita as regras de convivência.\n2. O conteúdo expira em 12h.\n3. Moedas são ganhas com likes.\n4. Chamadas de vídeo consomem moedas.", usernamePlaceholder:"Nome de usuário" },
        it: { welcomeTitle:"MILUCHAT", acceptTerms:"Accetto i termini", joinBtn:"Accedi", requestCoins:"➕ Richiedi monete", changeLang:"🌐 Cambia lingua", onlineUsers:"📡 Online", globalChat:"💬 Chat Globale", send:"Invia", call:"📹", wall:"📸 Bacheca (carica foto/video)", upload:"📤 Carica", logout:"🚪 Esci", admin:"🔐 Admin", terms:"📜 Termini e condizioni\n1. Accetti le regole di convivenza.\n2. I contenuti scadono dopo 12 ore.\n3. Le monete si guadagnano con i like.\n4. Le videochiamate consumano monete.", usernamePlaceholder:"Nome utente" },
        zh: { welcomeTitle:"MILUCHAT", acceptTerms:"我接受条款", joinBtn:"登录", requestCoins:"➕ 请求硬币", changeLang:"🌐 更改语言", onlineUsers:"📡 在线", globalChat:"💬 全球聊天", send:"发送", call:"📹", wall:"📸 墙 (上传照片/视频)", upload:"📤 上传", logout:"🚪 退出", admin:"🔐 管理员", terms:"📜 条款和条件\n1. 您接受共存规则。\n2. 上传内容12小时后过期。\n3. 硬币通过点赞获得。\n4. 视频通话消耗硬币。", usernamePlaceholder:"用户名" },
        ja: { welcomeTitle:"MILUCHAT", acceptTerms:"利用規約に同意する", joinBtn:"ログイン", requestCoins:"➕ コインをリクエスト", changeLang:"🌐 言語変更", onlineUsers:"📡 オンライン", globalChat:"💬 グローバルチャット", send:"送信", call:"📹", wall:"📸 ウォール (写真/動画をアップロード)", upload:"📤 アップロード", logout:"🚪 ログアウト", admin:"🔐 管理者", terms:"📜 利用規約\n1. 共存ルールに同意します。\n2. アップロードされたコンテンツは12時間で期限切れになります。\n3. いいね！でコインを獲得できます。\n4. ビデオ通話にはコインが必要です。", usernamePlaceholder:"ユーザー名" }
    };
    let userLanguage = 'es';
    function applyUILanguage(lang) {
        const t = translations[lang] || translations.es;
        document.getElementById('welcomeTitle').innerText = t.welcomeTitle;
        document.getElementById('acceptTermsLabel').innerText = t.acceptTerms;
        document.getElementById('joinBtn').innerText = t.joinBtn;
        document.getElementById('requestCoinsBtn').innerText = t.requestCoins;
        document.getElementById('changeLangBtn').innerText = t.changeLang;
        document.querySelector('.online-users h4').innerText = t.onlineUsers;
        document.querySelector('.chat-header').innerText = t.globalChat;
        document.getElementById('sendBtn').innerText = t.send;
        document.getElementById('callGlobalBtn').innerText = t.call;
        document.querySelector('.wall-column .chat-header').innerText = t.wall;
        document.getElementById('uploadMediaBtn').innerText = t.upload;
        document.getElementById('logoutBtn').innerText = t.logout;
        document.getElementById('adminLoginBtn').innerText = t.admin;
        document.getElementById('usernameInput').placeholder = t.usernamePlaceholder;
        document.getElementById('termsBox').innerHTML = `<strong>${t.terms.split('\n')[0]}</strong><br>${t.terms.split('\n').slice(1).join('<br>')}`;
    }

    const socket = io();
    let currentUsername = null;
    let currentRoom = "global";
    let autoScroll = true;
    let floatingWindows = new Map();
    let mediaPosts = [];
    let userCountry = 'COL';
    let isAdmin = false;
    let audioCtx = null;
    let activeCall = null; // para gestionar la videollamada

    // Sonido
    function playSound() {
        try {
            if (!audioCtx) audioCtx = new (AudioContext || webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 800;
            gain.gain.value = 0.1;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            osc.stop(audioCtx.currentTime + 0.3);
        } catch(e) {}
    }
    function showNotification(title, body) { if (Notification.permission === 'granted') new Notification(title, { body }); }
    if (Notification.permission === 'default') Notification.requestPermission();

    // Traducción de mensajes con caché
    const translationCache = new Map();
    async function translateText(text, targetLang, sourceLang = 'es') {
        if (!text || targetLang === sourceLang) return text;
        const cacheKey = text + '|' + sourceLang + '|' + targetLang;
        if (translationCache.has(cacheKey)) return translationCache.get(cacheKey);
        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`;
            const res = await fetch(url);
            const data = await res.json();
            const translated = data.responseData.translatedText || text;
            translationCache.set(cacheKey, translated);
            return translated;
        } catch(e) { return text; }
    }

    // Emojis globales
    const emojis = ['😀', '😂', '😍', '🎉', '👍', '❤️', '🔥', '⭐', '🍕', '🎮', '😎', '👏'];
    const emojiRow = document.getElementById('emojiRow');
    emojis.forEach(emo => {
        const span = document.createElement('span');
        span.className = 'emoji-item';
        span.textContent = emo;
        span.onclick = () => sendTextMessage(emo);
        emojiRow.appendChild(span);
    });

    // DOM elements
    const welcomeDiv = document.getElementById('welcomeScreen');
    const chatDiv = document.getElementById('chatApp');
    const usernameInput = document.getElementById('usernameInput');
    const languageSelect = document.getElementById('languageSelect');
    const countrySelect = document.getElementById('countrySelect');
    const acceptTermsCheck = document.getElementById('acceptTerms');
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const usersListDiv = document.getElementById('usersList');
    const logoutBtn = document.getElementById('logoutBtn');
    const uploadMediaBtn = document.getElementById('uploadMediaBtn');
    const mediaFileInput = document.getElementById('mediaFileInput');
    const callGlobalBtn = document.getElementById('callGlobalBtn');
    const myCoinsSpan = document.getElementById('myCoins');
    const myNameSpan = document.getElementById('myName');
    const mediaWall = document.getElementById('mediaWall');
    const requestCoinsBtn = document.getElementById('requestCoinsBtn');
    const changeLangBtn = document.getElementById('changeLangBtn');
    const adminLoginBtn = document.getElementById('adminLoginBtn');
    const adminPanelDiv = document.getElementById('adminPanel');

    acceptTermsCheck.onchange = () => { joinBtn.disabled = !acceptTermsCheck.checked; };

    async function addMessageToDOM(data, isOwn) {
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : ''}`;
        let displayText = data.text;
        if (!isOwn && userLanguage !== (data.originalLang || 'es')) {
            displayText = await translateText(data.text, userLanguage, data.originalLang || 'es');
        }
        div.innerHTML = `
            <div class="message-bubble">${escapeHtml(displayText)}</div>
            <div class="message-info">
                <span>${escapeHtml(data.username)}</span>
                <span>${new Date(data.timestamp).toLocaleTimeString()}</span>
                ${isOwn ? `<button class="delete-msg" data-id="${data.id}">🗑️</button>` : ''}
            </div>
        `;
        messagesContainer.appendChild(div);
        if (autoScroll) messagesContainer.scrollTop = messagesContainer.scrollHeight;
        playSound();
        if (!isOwn && document.hidden) showNotification(data.username, displayText);
        const delBtn = div.querySelector('.delete-msg');
        if (delBtn) delBtn.onclick = () => { if(confirm('¿Eliminar mensaje?')) socket.emit('delete message', { messageId: data.id }); };
    }

    function addSystemMessage(text) {
        const div = document.createElement('div');
        div.className = 'system-message';
        div.innerText = text;
        messagesContainer.appendChild(div);
        if (autoScroll) messagesContainer.scrollTop = messagesContainer.scrollHeight;
        playSound();
    }

    function renderMediaWall() {
        mediaWall.innerHTML = '';
        mediaPosts.forEach(post => {
            const div = document.createElement('div');
            div.className = 'media-post';
            const mediaHtml = post.type === 'image' ? `<img src="${post.content}">` : `<video controls src="${post.content}"></video>`;
            div.innerHTML = `
                <div><strong>${escapeHtml(post.username)}</strong> <small>${new Date(post.timestamp).toLocaleString()}</small></div>
                ${mediaHtml}
                <div>
                    <button class="like-btn" data-id="${post.id}">❤️ ${post.likes}</button>
                    ${post.username === currentUsername ? `<button class="delete-media" data-id="${post.id}">🗑️</button>` : ''}
                </div>
                <small>Expira: ${new Date(post.expiresAt).toLocaleTimeString()}</small>
            `;
            mediaWall.appendChild(div);
        });
        document.querySelectorAll('.like-btn').forEach(btn => btn.onclick = () => socket.emit('like content', { contentId: btn.dataset.id }));
        document.querySelectorAll('.delete-media').forEach(btn => btn.onclick = () => { if(confirm('¿Eliminar contenido?')) socket.emit('delete media', { postId: btn.dataset.id }); });
    }

    function updateUsersList(users) {
        usersListDiv.innerHTML = '';
        users.forEach(user => {
            if (user.username !== currentUsername) {
                const div = document.createElement('div');
                div.className = 'user-online';
                div.innerHTML = `<span class="status-dot"></span><span>${escapeHtml(user.username)} (${user.country})</span>`;
                div.onclick = () => openPrivateChat(user.username);
                usersListDiv.appendChild(div);
            }
        });
    }

    // Videollamada simulada con cámara real
    async function startCall(targetUser, durationMinutes, fromIncoming = false) {
        if (!fromIncoming) {
            socket.emit('start call', { targetUsername: targetUser, durationMinutes }, (res) => {
                if (!res.success) { alert(res.error); return; }
                alert(res.message);
                showCallUI(durationMinutes, true);
            });
        } else {
            showCallUI(durationMinutes, true);
        }
    }

    function showCallUI(durationMinutes, isCaller) {
        const overlay = document.createElement('div');
        overlay.className = 'call-overlay';
        overlay.innerHTML = `
            <div style="background:#222; border-radius:20px; padding:20px; text-align:center; max-width:90%">
                <h2 style="color:white">📹 Videollamada</h2>
                <div id="localVideoContainer" style="margin-bottom:10px;"><video id="localVideo" autoplay muted playsinline style="width:100%; max-width:400px; border-radius:16px;"></video></div>
                <div id="remoteVideoContainer" style="margin-bottom:10px;"><video id="remoteVideo" autoplay playsinline style="width:100%; max-width:400px; border-radius:16px;"></video></div>
                <div class="call-controls">
                    <button id="endCallBtn" style="background:#ef4444; padding:8px 20px; border:none; border-radius:40px; color:white; cursor:pointer;">Colgar</button>
                    <span id="timerLabel" style="color:white; margin-left:10px;">Duración: 0:00 / ${durationMinutes}:00</span>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        let stream = null;
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(s => {
                stream = s;
                const localVideo = document.getElementById('localVideo');
                if (localVideo) localVideo.srcObject = stream;
                // Simulación: para la otra persona deberíamos recibir su stream, pero como no implementamos WebRTC completo, mostramos un mensaje.
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && !isCaller) remoteVideo.style.display = 'none';
                else if (remoteVideo) remoteVideo.style.display = 'none';
                addSystemMessage(`📹 Llamada iniciada. Duración: ${durationMinutes} min. Se gastaron ${Math.ceil(durationMinutes/2)*1.5} monedas.`);
            })
            .catch(err => { alert('No se pudo acceder a la cámara/micrófono'); overlay.remove(); });
        let timeLeft = durationMinutes * 60;
        const timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (stream) stream.getTracks().forEach(t => t.stop());
                overlay.remove();
                addSystemMessage('📹 Llamada finalizada.');
            } else {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                const timerSpan = document.getElementById('timerLabel');
                if (timerSpan) timerSpan.innerText = `Duración: ${minutes}:${seconds.toString().padStart(2,'0')} / ${durationMinutes}:00`;
            }
        }, 1000);
        document.getElementById('endCallBtn').onclick = () => {
            clearInterval(timerInterval);
            if (stream) stream.getTracks().forEach(t => t.stop());
            overlay.remove();
            addSystemMessage('📹 Llamada finalizada manualmente.');
        };
    }

    // Escuchar eventos de llamada entrante
    socket.on('incoming call', ({ from, durationMinutes, cost }) => {
        if (confirm(`${from} te llama por ${durationMinutes} min. ¿Aceptar?`)) {
            socket.emit('accept call', { fromUsername: from });
            showCallUI(durationMinutes, false);
        } else {
            socket.emit('reject call', { fromUsername: from });
        }
    });

    socket.on('call accepted', ({ message }) => alert(message));
    socket.on('call rejected', ({ message }) => alert(message));
    socket.on('call started', ({ withUser }) => alert(`Llamada iniciada con ${withUser}`));

    // Chat privado (con input que se limpia después de enviar)
    function openPrivateChat(targetUser) {
        if (targetUser === currentUsername) return;
        if (floatingWindows.has(targetUser)) {
            floatingWindows.get(targetUser).div.classList.remove('minimized');
            floatingWindows.get(targetUser).div.style.display = 'flex';
            return;
        }
        socket.emit('start private chat', { targetUsername: targetUser }, (resp) => {
            if (!resp.success) { alert(resp.error); return; }
            const roomName = resp.roomName;
            const floatingDiv = document.createElement('div');
            floatingDiv.className = 'floating-chat';
            floatingDiv.innerHTML = `
                <div class="floating-header">
                    <span>💬 ${escapeHtml(targetUser)}</span>
                    <div><button class="call-private-btn">📹</button><button class="minimize-float">−</button><button class="close-float">✖</button></div>
                </div>
                <div class="floating-messages"></div>
                <div class="floating-emoji-row"></div>
                <div class="floating-input-wrapper"><input type="text" placeholder="Mensaje..."><button>Enviar</button></div>
            `;
            document.body.appendChild(floatingDiv);
            const messagesFloat = floatingDiv.querySelector('.floating-messages');
            const inputFloat = floatingDiv.querySelector('input');
            const sendFloatBtn = floatingDiv.querySelector('button');
            const minimizeBtn = floatingDiv.querySelector('.minimize-float');
            const closeBtn = floatingDiv.querySelector('.close-float');
            const callPrivateBtn = floatingDiv.querySelector('.call-private-btn');
            const floatEmojiRow = floatingDiv.querySelector('.floating-emoji-row');
            emojis.forEach(emo => {
                const span = document.createElement('span');
                span.className = 'emoji-item';
                span.textContent = emo;
                span.onclick = () => inputFloat.value += emo;
                floatEmojiRow.appendChild(span);
            });
            // Drag
            let isDragging = false, offsetX, offsetY;
            const header = floatingDiv.querySelector('.floating-header');
            header.addEventListener('mousedown', (e) => {
                isDragging = true;
                offsetX = e.clientX - floatingDiv.offsetLeft;
                offsetY = e.clientY - floatingDiv.offsetTop;
                floatingDiv.style.position = 'fixed';
            });
            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    floatingDiv.style.left = (e.clientX - offsetX) + 'px';
                    floatingDiv.style.top = (e.clientY - offsetY) + 'px';
                    floatingDiv.style.right = 'auto';
                }
            });
            window.addEventListener('mouseup', () => isDragging = false);
            minimizeBtn.onclick = () => floatingDiv.classList.toggle('minimized');
            closeBtn.onclick = () => {
                socket.emit('leave private chat', { roomName });
                floatingDiv.remove();
                floatingWindows.delete(targetUser);
                if (floatingDiv.privateHandler) socket.off('private message', floatingDiv.privateHandler);
            };
            callPrivateBtn.onclick = () => {
                const mins = prompt('Duración en minutos (2,4,6...) - Costo: 1.5 monedas/min', '2');
                if (mins) startCall(targetUser, parseInt(mins));
            };
            // Enviar mensaje privado Y LIMPIAR INPUT
            const sendPrivate = () => {
                const txt = inputFloat.value.trim();
                if (!txt) return;
                socket.emit('chat message', { text: txt, room: roomName });
                inputFloat.value = '';  // Limpiar el campo después de enviar
            };
            sendFloatBtn.onclick = sendPrivate;
            inputFloat.onkeypress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendPrivate();
                }
            };
            const privateMessageHandler = async (data) => {
                if (data.username === targetUser || data.username === currentUsername) {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${data.username === currentUsername ? 'own' : ''}`;
                    let displayText = data.text;
                    if (data.username !== currentUsername && userLanguage !== (data.originalLang || 'es')) {
                        displayText = await translateText(data.text, userLanguage, data.originalLang || 'es');
                    }
                    msgDiv.innerHTML = `<div class="message-bubble">${escapeHtml(displayText)}</div><div class="message-info"><span>${escapeHtml(data.username)}</span><span>${new Date(data.timestamp).toLocaleTimeString()}</span></div>`;
                    messagesFloat.appendChild(msgDiv);
                    messagesFloat.scrollTop = messagesFloat.scrollHeight;
                    playSound();
                }
            };
            socket.on('private message', privateMessageHandler);
            floatingDiv.privateHandler = privateMessageHandler;
            floatingWindows.set(targetUser, { div: floatingDiv, roomName, handler: privateMessageHandler });
        });
    }

    function sendTextMessage(text = null) {
        let msg = text !== null ? text : messageInput.value.trim();
        if (!msg) return;
        socket.emit('chat message', { text: msg, room: currentRoom });
        if (text === null) messageInput.value = '';
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // Socket events
    socket.on('global history', (msgs) => msgs.forEach(m => addMessageToDOM(m, m.username === currentUsername)));
    socket.on('chat message', (data) => { if (currentRoom === 'global') addMessageToDOM(data, data.username === currentUsername); });
    socket.on('system message', (data) => addSystemMessage(data.text));
    socket.on('user list', updateUsersList);
    socket.on('media posts update', (posts) => { mediaPosts = posts; renderMediaWall(); });
    socket.on('coins update', (coins) => { myCoinsSpan.innerText = coins; });
    socket.on('message deleted', (id) => { document.querySelector(`.delete-msg[data-id="${id}"]`)?.closest('.message')?.remove(); });
    socket.on('force logout', (msg) => { alert(msg); localStorage.clear(); location.reload(); });
    socket.on('private chat started', ({ withUser }) => { if (!floatingWindows.has(withUser)) openPrivateChat(withUser); });

    // Subir multimedia
    uploadMediaBtn.onclick = () => mediaFileInput.click();
    mediaFileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.type.startsWith('video')) {
            const video = document.createElement('video');
            video.preload = 'metadata';
            video.onloadedmetadata = () => {
                if (video.duration > 30) { alert('Máximo 30 segundos'); return; }
                uploadFile(file);
            };
            video.src = URL.createObjectURL(file);
        } else uploadFile(file);
    };
    function uploadFile(file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const mediaType = file.type.startsWith('image') ? 'image' : 'video';
            socket.emit('media message', { mediaType, content: ev.target.result });
        };
        reader.readAsDataURL(file);
        mediaFileInput.value = '';
    }

    // Solicitar monedas
    requestCoinsBtn.onclick = () => {
        const amount = prompt('¿Cuántas monedas necesitas? (máx 12)', '3');
        if (amount && !isNaN(amount) && amount >= 1 && amount <= 12) {
            socket.emit('request coins', { amount: parseInt(amount), message: 'Solicitud de monedas' });
            alert('Solicitud enviada al administrador');
        }
    };

    // ADMIN LOGIN (mismo código de antes)
    adminLoginBtn.onclick = () => {
        const pwd = prompt('Contraseña de administrador:');
        if (pwd) {
            socket.emit('admin login', pwd, (success) => {
                if (success) {
                    isAdmin = true;
                    adminPanelDiv.style.display = 'block';
                    adminPanelDiv.innerHTML = `
                        <div style="display:flex; justify-content:space-between;"><h4>Panel Admin</h4><button id="closeAdminBtn">✖</button></div>
                        <div id="adminRequestsList"></div>
                        <h5>Dar monedas</h5>
                        <input type="text" id="adminGiveUser" placeholder="Nombre usuario">
                        <input type="number" id="adminGiveAmount" min="1" max="12" placeholder="Cantidad">
                        <button id="adminGiveCoinsBtn">Dar</button>
                        <h5>Bloquear/Desbloquear</h5>
                        <input type="text" id="adminBlockUser" placeholder="Nombre usuario">
                        <button id="adminBlockBtn">Bloquear</button>
                        <button id="adminUnblockBtn">Desbloquear</button>
                    `;
                    document.getElementById('closeAdminBtn').onclick = () => { adminPanelDiv.style.display = 'none'; isAdmin = false; };
                    document.getElementById('adminGiveCoinsBtn').onclick = () => {
                        const target = document.getElementById('adminGiveUser').value.trim();
                        const amount = parseInt(document.getElementById('adminGiveAmount').value);
                        if (target && amount) socket.emit('admin give coins', { targetUsername: target, amount }, (res) => alert(res.success ? 'Monedas enviadas' : res.error));
                        else alert('Ingresa nombre y cantidad');
                    };
                    document.getElementById('adminBlockBtn').onclick = () => {
                        const user = document.getElementById('adminBlockUser').value.trim();
                        if (user) socket.emit('admin toggle block', { targetUsername: user, block: true }, (res) => alert(res.success ? 'Bloqueado' : res.error));
                    };
                    document.getElementById('adminUnblockBtn').onclick = () => {
                        const user = document.getElementById('adminBlockUser').value.trim();
                        if (user) socket.emit('admin toggle block', { targetUsername: user, block: false }, (res) => alert(res.success ? 'Desbloqueado' : res.error));
                    };
                    socket.emit('admin pending requests', (requests) => updateAdminRequests(requests));
                    socket.on('admin pending requests', (requests) => updateAdminRequests(requests));
                    socket.on('new coin request', () => socket.emit('admin pending requests', (r) => updateAdminRequests(r)));
                } else alert('Contraseña incorrecta');
            });
        }
    };
    function updateAdminRequests(requests) {
        const container = document.getElementById('adminRequestsList');
        if (!container) return;
        container.innerHTML = '';
        if (!requests || requests.length === 0) { container.innerHTML = '<div>No hay solicitudes</div>'; return; }
        requests.forEach((req, idx) => {
            const div = document.createElement('div');
            div.innerHTML = `${req.from} pide ${req.amount} monedas <button class="admin-give-req" data-idx="${idx}">Dar</button> <button class="admin-deny-req" data-idx="${idx}">Denegar</button>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.admin-give-req').forEach(btn => btn.onclick = () => socket.emit('admin resolve request', { requestIndex: parseInt(btn.dataset.idx), giveCoins: true }));
        document.querySelectorAll('.admin-deny-req').forEach(btn => btn.onclick = () => socket.emit('admin resolve request', { requestIndex: parseInt(btn.dataset.idx), giveCoins: false }));
    }

    // Cambiar idioma (interfaz y mensajes)
    changeLangBtn.onclick = () => {
        const newLang = prompt('Código de idioma (es, en, fr, de, pt, it, zh, ja):', userLanguage);
        if (newLang && translations[newLang]) {
            userLanguage = newLang;
            applyUILanguage(newLang);
            addSystemMessage(`Idioma cambiado a ${newLang}. Los mensajes se traducirán automáticamente.`);
            messagesContainer.innerHTML = '';
            socket.emit('global history', (msgs) => msgs.forEach(m => addMessageToDOM(m, m.username === currentUsername)));
        } else alert('Idioma no soportado');
    };

    sendBtn.onclick = () => sendTextMessage();
    messageInput.onkeypress = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTextMessage(); } };
    messagesContainer.onscroll = () => { autoScroll = messagesContainer.scrollHeight - messagesContainer.clientHeight <= messagesContainer.scrollTop + 80; };
    logoutBtn.onclick = () => { socket.emit('logout'); localStorage.clear(); location.reload(); };
    callGlobalBtn.onclick = () => {
        const target = prompt('¿A quién llamar? (nombre de usuario)');
        if (!target) return;
        const mins = prompt('Duración en minutos (2,4,6...) - Costo: 1.5 mon/min', '2');
        if (mins) startCall(target, parseInt(mins));
    };

    // Inicio de sesión
    function joinChat(username, lang, country) {
        socket.emit('set username', { username, language: lang, country }, (success, data) => {
            if (success) {
                currentUsername = username;
                userLanguage = lang;
                userCountry = country;
                localStorage.setItem('miluchat_user', username);
                localStorage.setItem('miluchat_lang', lang);
                localStorage.setItem('miluchat_country', country);
                welcomeDiv.style.display = 'none';
                chatDiv.style.display = 'flex';
                myCoinsSpan.innerText = data.coins;
                myNameSpan.innerText = username;
                addSystemMessage(`✨ Bienvenido ${username}. Tienes ${data.coins} monedas.`);
            } else errorMsg.innerText = data;
        });
    }
    const savedLang = localStorage.getItem('miluchat_lang');
    if (savedLang && translations[savedLang]) applyUILanguage(savedLang);
    else applyUILanguage('es');
    const savedUser = localStorage.getItem('miluchat_user');
    if (savedUser) {
        userLanguage = localStorage.getItem('miluchat_lang') || 'es';
        userCountry = localStorage.getItem('miluchat_country') || 'COL';
        languageSelect.value = userLanguage;
        countrySelect.value = userCountry;
        joinChat(savedUser, userLanguage, userCountry);
    }
    joinBtn.onclick = () => {
        const name = usernameInput.value.trim();
        const lang = languageSelect.value;
        const country = countrySelect.value;
        if (name && acceptTermsCheck.checked) joinChat(name, lang, country);
        else if (!acceptTermsCheck.checked) errorMsg.innerText = 'Acepta los términos';
        else errorMsg.innerText = 'Ingresa un nombre';
    };
</script>
</body>
</html>
