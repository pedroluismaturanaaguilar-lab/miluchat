
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MILUCHAT</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        /* Variables generales */
        :root {
            --bg-dark: #1a1e24;
            --bg-sidebar: #22262e;
            --bg-chat: #2a2f38;
            --text-primary: #e1e9f0;
            --text-secondary: #8a98a9;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #3a4050;
            --bubble-own: #3b82f6;
            --bubble-other: #323842;
            --danger: #ef4444;
            --scrollbar-track: #2a2f38;
            --scrollbar-thumb: #3b82f6;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px; /* reducido para móvil */
        }

        /* Pantalla de bienvenida (responsive) */
        .welcome-screen {
            background: var(--bg-sidebar);
            width: 90%;
            max-width: 400px;
            padding: 1.5rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            margin: 0 auto;
        }
        .welcome-screen h1 {
            font-size: 1.8rem;
        }
        .welcome-screen input {
            padding: 10px;
            font-size: 1rem;
        }
        .welcome-message {
            font-size: 0.8rem;
        }
        .welcome-screen button {
            padding: 10px 20px;
        }

        /* Chat principal */
        .chat-app {
            display: none;
            width: 100%;
            height: 100vh;
            max-height: 100%;
            background: var(--bg-sidebar);
            border-radius: 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        .app-grid {
            display: grid;
            grid-template-columns: 60px 1fr 0px; /* panel derecho oculto en móvil */
            height: 100%;
        }

        /* Barra lateral izquierda compacta */
        .left-sidebar {
            background: #1a1e24;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 20px;
            border-right: 1px solid var(--border);
        }
        .sidebar-btn {
            font-size: 1.4rem;
        }

        /* Centro: chat */
        .center-area {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg-chat);
            overflow: hidden;
        }
        .chat-header h2 {
            font-size: 1.2rem;
            padding: 12px 16px;
        }
        .messages-container {
            padding: 12px;
            gap: 10px;
        }
        .emoji-row {
            gap: 6px;
            padding: 6px 12px;
        }
        .emoji-item {
            font-size: 1.2rem;
        }
        .input-fixed {
            padding: 8px 12px;
            gap: 8px;
        }
        .input-fixed textarea {
            padding: 8px 12px;
            font-size: 0.85rem;
        }
        .input-fixed button {
            padding: 8px 14px;
        }

        /* Burbujas en móvil */
        .message {
            max-width: 85%;
        }
        .message-bubble {
            padding: 6px 12px;
            font-size: 0.9rem;
        }
        .message-info {
            font-size: 0.65rem;
        }

        /* Ventanas flotantes (privadas) */
        .floating-chat {
            width: 90%;
            max-width: 320px;
            height: 70%;
            max-height: 500px;
            bottom: 10px;
            right: 10px;
            left: auto;
            border-radius: 16px;
        }
        .floating-header {
            padding: 8px 10px;
            font-size: 0.9rem;
        }
        .floating-emoji-row {
            gap: 4px;
            padding: 4px 8px;
        }
        .floating-emoji-item {
            font-size: 1rem;
        }
        .floating-toolbar button {
            padding: 4px 8px;
            font-size: 0.9rem;
        }
        .floating-input-wrapper input {
            padding: 6px 10px;
            font-size: 0.85rem;
        }
        .floating-input-wrapper button {
            padding: 4px 10px;
        }

        /* Ocultar panel derecho en móvil (se puede agregar botón para mostrarlo después) */
        .right-sidebar {
            display: none;
        }

        /* Scrollbar sigue siendo visible */
        .messages-container::-webkit-scrollbar,
        .floating-messages::-webkit-scrollbar {
            width: 4px;
        }

        @media (min-width: 768px) {
            body {
                padding: 16px;
            }
            .chat-app {
                border-radius: 24px;
                position: relative;
                height: 90vh;
                max-width: 1400px;
                margin: 0 auto;
            }
            .app-grid {
                grid-template-columns: 80px 1fr 280px;
            }
            .right-sidebar {
                display: flex;
            }
            .floating-chat {
                width: 360px;
                height: 520px;
                bottom: 20px;
                right: 20px;
            }
            .message {
                max-width: 75%;
            }
            .chat-header h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<div id="welcomeScreen" class="welcome-screen">
    <h1>MILUCHAT</h1>
    <p>Comunicación profesional</p>
    <input type="text" id="usernameInput" placeholder="Nombre de usuario" autocomplete="off">
    <div class="welcome-message">
        ✨ Bienvenido a MILUCHAT, donde conocerás nuevas personas.<br>
        Espero que lo disfrutes y comienza a conversar.
    </div>
    <button id="joinBtn">Ingresar</button>
    <div id="errorMsg" class="error-msg"></div>
</div>

<div id="chatApp" class="chat-app">
    <div class="app-grid">
        <div class="left-sidebar">
            <button id="logoutBtn" class="sidebar-btn" title="Cerrar sesión">🚪</button>
            <button id="darkModeBtn" class="sidebar-btn" title="Modo oscuro/claro">🌙</button>
            <button id="uploadMediaBtn" class="sidebar-btn" title="Subir archivo">📎</button>
            <button id="voiceRecordBtn" class="sidebar-btn" title="Grabar audio">🎙️</button>
            <input type="file" id="mediaFileInput" class="file-input" accept="image/*,video/*,audio/*,*/*">
        </div>
        <div class="center-area">
            <div class="chat-header">
                <h2>MILUCHAT</h2>
            </div>
            <div id="messagesContainer" class="messages-container"></div>
            <div class="emoji-row" id="emojiRow"></div>
            <div class="input-fixed">
                <textarea id="messageInput" rows="1" placeholder="Escribe un mensaje..."></textarea>
                <button id="sendBtn">Enviar</button>
            </div>
        </div>
        <div class="right-sidebar">
            <h3>👥 Conectados (<span id="userCount">0</span>)</h3>
            <div id="usersList" class="users-list"></div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let currentUsername = null;
    let autoScroll = true;
    let unreadCount = 0;
    let originalTitle = "MILUCHAT";
    let currentRoom = "global";
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    const floatingWindows = new Map();

    // DOM elements
    const welcomeDiv = document.getElementById('welcomeScreen');
    const chatDiv = document.getElementById('chatApp');
    const usernameInput = document.getElementById('usernameInput');
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const usersListDiv = document.getElementById('usersList');
    const userCountSpan = document.getElementById('userCount');
    const logoutBtn = document.getElementById('logoutBtn');
    const darkModeBtn = document.getElementById('darkModeBtn');
    const uploadMediaBtn = document.getElementById('uploadMediaBtn');
    const mediaFileInput = document.getElementById('mediaFileInput');
    const voiceRecordBtn = document.getElementById('voiceRecordBtn');
    const emojiRow = document.getElementById('emojiRow');

    const commonEmojis = ['😀', '😂', '😍', '🎉', '👍', '❤️', '🔥', '⭐', '🍕', '🎮', '😎', '👏', '🙌', '💀', '✨', '😢', '😡'];

    commonEmojis.forEach(emoji => {
        const span = document.createElement('span');
        span.className = 'emoji-item';
        span.textContent = emoji;
        span.addEventListener('click', () => sendTextMessage(emoji));
        emojiRow.appendChild(span);
    });

    // Modo oscuro
    darkModeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        darkModeBtn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        darkModeBtn.textContent = '☀️';
    }

    logoutBtn.addEventListener('click', () => {
        socket.emit('logout');
        localStorage.removeItem('miluchat_username');
        location.reload();
    });

    // Subir archivos al chat global
    uploadMediaBtn.addEventListener('click', () => mediaFileInput.click());
    mediaFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            let mediaType = 'file';
            if (file.type.startsWith('image')) mediaType = 'image';
            else if (file.type.startsWith('video')) mediaType = 'video';
            else if (file.type.startsWith('audio')) mediaType = 'audio';
            socket.emit('media message', { mediaType, content: ev.target.result, room: currentRoom });
        };
        reader.readAsDataURL(file);
        mediaFileInput.value = '';
    });

    // Grabación de audio global
    voiceRecordBtn.addEventListener('mousedown', startRecording);
    voiceRecordBtn.addEventListener('mouseup', stopRecordingAndSend);
    voiceRecordBtn.addEventListener('mouseleave', stopRecordingAndSend);
    function startRecording() {
        if (isRecording) return;
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        socket.emit('media message', { mediaType: 'audio', content: ev.target.result, room: currentRoom });
                    };
                    reader.readAsDataURL(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                    voiceRecordBtn.style.color = '';
                };
                mediaRecorder.start();
                isRecording = true;
                voiceRecordBtn.style.color = '#ef4444';
                setTimeout(() => {
                    if (isRecording) stopRecordingAndSend();
                }, 10000);
            })
            .catch(err => alert('No se pudo acceder al micrófono'));
    }
    function stopRecordingAndSend() {
        if (mediaRecorder && isRecording && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            isRecording = false;
        }
    }

    function sendTextMessage(text = null, targetRoom = null) {
        let msg = (text !== null) ? text : messageInput.value.trim();
        if (!msg) return;
        const room = targetRoom || currentRoom;
        socket.emit('chat message', { text: msg, room });
        if (text === null && targetRoom === null) messageInput.value = '';
        if (text === null) messageInput.style.height = 'auto';
    }

    function addMessageToDOM(data, isOwn, isSystem = false) {
        const div = document.createElement('div');
        if (isSystem) {
            div.className = 'system-message';
            div.innerText = data.text;
            messagesContainer.appendChild(div);
        } else {
            div.className = `message ${isOwn ? 'own' : ''}`;
            let contentHtml = '';
            if (data.type === 'text') {
                const formatted = formatMentions(data.text);
                contentHtml = `<div class="message-bubble">${formatted}</div>`;
            } else if (data.type === 'image') {
                contentHtml = `<div class="message-bubble"><img src="${data.content}" style="max-width:180px; max-height:120px; border-radius:12px;"></div>`;
            } else if (data.type === 'video') {
                contentHtml = `<div class="message-bubble"><video controls src="${data.content}" style="max-width:180px; max-height:120px;"></video></div>`;
            } else if (data.type === 'audio') {
                contentHtml = `<div class="message-bubble"><audio controls src="${data.content}"></audio></div>`;
            } else {
                contentHtml = `<div class="message-bubble"><a href="${data.content}" download>📎 Archivo</a></div>`;
            }
            div.innerHTML = `
                ${contentHtml}
                <div class="message-info">
                    <span class="username-msg">${escapeHtml(data.username)}</span>
                    <span>${new Date(data.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
            `;
            messagesContainer.appendChild(div);
        }
        const isNearBottom = messagesContainer.scrollHeight - messagesContainer.clientHeight <= messagesContainer.scrollTop + 80;
        if (autoScroll && isNearBottom) messagesContainer.scrollTop = messagesContainer.scrollHeight;
        if (!isOwn && !isSystem && !document.hasFocus()) {
            unreadCount++;
            document.title = `(${unreadCount}) Nuevo mensaje - MILUCHAT`;
            playBeep();
        }
    }

    function formatMentions(text) {
        const mentionRegex = /@(\w+)/g;
        return text.replace(mentionRegex, match => `<span style="background:#3b82f6; color:white; border-radius:12px; padding:0 4px;">${match}</span>`);
    }
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 800;
            gain.gain.value = 0.08;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            osc.stop(audioCtx.currentTime + 0.3);
        } catch(e) {}
    }
    window.addEventListener('focus', () => {
        unreadCount = 0;
        document.title = originalTitle;
    });

    function updateUsersList(users) {
        usersListDiv.innerHTML = '';
        users.forEach(user => {
            if (user !== currentUsername) {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `<span class="status-dot"></span><span>${escapeHtml(user)}</span>`;
                div.addEventListener('click', () => openPrivateChat(user));
                usersListDiv.appendChild(div);
            }
        });
        userCountSpan.innerText = users.length;
    }

    // ================== VENTANAS FLOTANTES ==================
    function openPrivateChat(targetUser) {
        if (targetUser === currentUsername) return;
        if (floatingWindows.has(targetUser)) {
            const win = floatingWindows.get(targetUser);
            win.windowDiv.classList.remove('minimized');
            win.windowDiv.style.display = 'flex';
            win.windowDiv.style.zIndex = 1000;
            return;
        }
        const roomName = `private_${[currentUsername, targetUser].sort().join('_')}`;
        const floatingDiv = document.createElement('div');
        floatingDiv.className = 'floating-chat';
        floatingDiv.innerHTML = `
            <div class="floating-header">
                <span>💬 ${escapeHtml(targetUser)}</span>
                <div>
                    <button class="minimize-float">−</button>
                    <button class="close-float">✖</button>
                </div>
            </div>
            <div class="floating-messages"></div>
            <div class="floating-emoji-row" id="floatEmojiRow_${Date.now()}"></div>
            <div class="floating-toolbar">
                <button class="float-attach-btn" title="Adjuntar archivo">📎</button>
                <button class="float-mic-btn" title="Grabar audio">🎙️</button>
            </div>
            <div class="floating-input-wrapper">
                <input type="text" placeholder="Mensaje privado..." maxlength="500">
                <button class="float-send-btn">Enviar</button>
            </div>
        `;
        document.body.appendChild(floatingDiv);
        
        const messagesFloat = floatingDiv.querySelector('.floating-messages');
        const inputFloat = floatingDiv.querySelector('input');
        const sendFloatBtn = floatingDiv.querySelector('.float-send-btn');
        const attachFloatBtn = floatingDiv.querySelector('.float-attach-btn');
        const micFloatBtn = floatingDiv.querySelector('.float-mic-btn');
        const minimizeBtn = floatingDiv.querySelector('.minimize-float');
        const closeBtn = floatingDiv.querySelector('.close-float');
        const floatEmojiRow = floatingDiv.querySelector('.floating-emoji-row');

        // Emojis táctiles en ventana privada
        commonEmojis.forEach(emoji => {
            const span = document.createElement('span');
            span.className = 'floating-emoji-item';
            span.textContent = emoji;
            span.addEventListener('click', () => {
                addPrivateMessageToFloat(targetUser, { type: 'text', username: currentUsername, text: emoji, timestamp: Date.now() }, true);
                socket.emit('chat message', { text: emoji, room: roomName });
            });
            floatEmojiRow.appendChild(span);
        });

        // Arrastrar
        let isDragging = false, offsetX, offsetY;
        const header = floatingDiv.querySelector('.floating-header');
        header.addEventListener('mousedown', (e) => {
            isDragging = true;
            offsetX = e.clientX - floatingDiv.offsetLeft;
            offsetY = e.clientY - floatingDiv.offsetTop;
            floatingDiv.style.position = 'fixed';
        });
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                floatingDiv.style.left = (e.clientX - offsetX) + 'px';
                floatingDiv.style.top = (e.clientY - offsetY) + 'px';
                floatingDiv.style.right = 'auto';
            }
        });
        window.addEventListener('mouseup', () => isDragging = false);

        minimizeBtn.addEventListener('click', () => floatingDiv.classList.toggle('minimized'));
        closeBtn.addEventListener('click', () => {
            socket.emit('leave private chat', { roomName });
            floatingDiv.remove();
            floatingWindows.delete(targetUser);
        });

        function sendPrivateMessage() {
            const text = inputFloat.value.trim();
            if (!text) return;
            addPrivateMessageToFloat(targetUser, { type: 'text', username: currentUsername, text: text, timestamp: Date.now() }, true);
            socket.emit('chat message', { text: text, room: roomName });
            inputFloat.value = '';
        }
        sendFloatBtn.addEventListener('click', sendPrivateMessage);
        inputFloat.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendPrivateMessage();
            }
        });

        // Adjuntar archivo
        const floatFileInput = document.createElement('input');
        floatFileInput.type = 'file';
        floatFileInput.style.display = 'none';
        floatFileInput.accept = 'image/*,video/*,audio/*,*/*';
        attachFloatBtn.appendChild(floatFileInput);
        attachFloatBtn.addEventListener('click', () => floatFileInput.click());
        floatFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                let mediaType = 'file';
                if (file.type.startsWith('image')) mediaType = 'image';
                else if (file.type.startsWith('video')) mediaType = 'video';
                else if (file.type.startsWith('audio')) mediaType = 'audio';
                socket.emit('media message', { mediaType, content: ev.target.result, room: roomName });
                addPrivateMessageToFloat(targetUser, { type: mediaType, username: currentUsername, content: ev.target.result, timestamp: Date.now() }, true);
            };
            reader.readAsDataURL(file);
            floatFileInput.value = '';
        });

        // Grabar audio en ventana privada
        let floatMediaRecorder = null;
        let floatAudioChunks = [];
        let isFloatRecording = false;
        micFloatBtn.addEventListener('mousedown', async () => {
            if (isFloatRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                floatMediaRecorder = new MediaRecorder(stream);
                floatAudioChunks = [];
                floatMediaRecorder.ondataavailable = e => floatAudioChunks.push(e.data);
                floatMediaRecorder.onstop = () => {
                    const audioBlob = new Blob(floatAudioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        socket.emit('media message', { mediaType: 'audio', content: ev.target.result, room: roomName });
                        addPrivateMessageToFloat(targetUser, { type: 'audio', username: currentUsername, content: ev.target.result, timestamp: Date.now() }, true);
                    };
                    reader.readAsDataURL(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                    micFloatBtn.style.color = '';
                };
                floatMediaRecorder.start();
                isFloatRecording = true;
                micFloatBtn.style.color = '#ef4444';
                setTimeout(() => {
                    if (isFloatRecording && floatMediaRecorder && floatMediaRecorder.state === 'recording') {
                        floatMediaRecorder.stop();
                        isFloatRecording = false;
                        micFloatBtn.style.color = '';
                    }
                }, 10000);
            } catch (err) { alert('No se pudo acceder al micrófono'); }
        });
        micFloatBtn.addEventListener('mouseup', () => {
            if (isFloatRecording && floatMediaRecorder && floatMediaRecorder.state === 'recording') {
                floatMediaRecorder.stop();
                isFloatRecording = false;
                micFloatBtn.style.color = '';
            }
        });
        micFloatBtn.addEventListener('mouseleave', () => {
            if (isFloatRecording && floatMediaRecorder && floatMediaRecorder.state === 'recording') {
                floatMediaRecorder.stop();
                isFloatRecording = false;
                micFloatBtn.style.color = '';
            }
        });

        floatingWindows.set(targetUser, { windowDiv: floatingDiv, roomName, messagesFloat, input: inputFloat });
        socket.emit('start private chat', { targetUsername: targetUser }, (resp) => {
            if (!resp.success) {
                floatingDiv.remove();
                floatingWindows.delete(targetUser);
                alert(resp.error);
            }
        });
    }

    function addPrivateMessageToFloat(targetUser, data, isOwn) {
        const win = floatingWindows.get(targetUser);
        if (!win) return;
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : ''}`;
        let contentHtml = '';
        if (data.type === 'text') {
            contentHtml = `<div class="message-bubble">${escapeHtml(data.text)}</div>`;
        } else if (data.type === 'image') {
            contentHtml = `<div class="message-bubble"><img src="${data.content}" style="max-width:140px; border-radius:8px;"></div>`;
        } else if (data.type === 'video') {
            contentHtml = `<div class="message-bubble"><video controls src="${data.content}" style="max-width:140px;"></video></div>`;
        } else if (data.type === 'audio') {
            contentHtml = `<div class="message-bubble"><audio controls src="${data.content}"></audio></div>`;
        } else {
            contentHtml = `<div class="message-bubble"><a href="${data.content}" download>📎 Archivo</a></div>`;
        }
        div.innerHTML = `
            ${contentHtml}
            <div class="message-info">
                <span class="username-msg">${escapeHtml(data.username)}</span>
                <span>${new Date(data.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
            </div>
        `;
        win.messagesFloat.appendChild(div);
        win.messagesFloat.scrollTop = win.messagesFloat.scrollHeight;
    }

    // Socket events
    socket.on('chat message', (data) => {
        if (currentRoom === 'global') {
            addMessageToDOM(data, data.username === currentUsername);
        }
    });
    socket.on('private message', (data) => {
        const otherUser = (data.username === currentUsername) ? null : data.username;
        if (otherUser) {
            if (!floatingWindows.has(otherUser)) openPrivateChat(otherUser);
            addPrivateMessageToFloat(otherUser, data, data.username === currentUsername);
        }
    });
    socket.on('system message', (data) => {
        addMessageToDOM(data, false, true);
    });
    socket.on('user list', (users) => {
        updateUsersList(users);
    });
    socket.on('private chat started', ({ withUser }) => {
        if (!floatingWindows.has(withUser)) openPrivateChat(withUser);
    });
    socket.on('private chat closed', ({ roomName }) => {
        for (let [user, win] of floatingWindows.entries()) {
            if (win.roomName === roomName) {
                win.windowDiv.remove();
                floatingWindows.delete(user);
                break;
            }
        }
    });

    // Global controls
    sendBtn.addEventListener('click', () => sendTextMessage());
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendTextMessage();
        }
    });
    messagesContainer.addEventListener('scroll', () => {
        const bottom = messagesContainer.scrollHeight - messagesContainer.clientHeight <= messagesContainer.scrollTop + 30;
        autoScroll = bottom;
    });

    // Auto-login y mensaje de bienvenida
    function joinChat(username) {
        socket.emit('set username', username, (success, errMsg) => {
            if (success) {
                currentUsername = username;
                localStorage.setItem('miluchat_username', username);
                welcomeDiv.style.display = 'none';
                chatDiv.style.display = 'flex';
                originalTitle = document.title;
                document.title = `MILUCHAT - ${username}`;
                messageInput.focus();
                setTimeout(() => {
                    addMessageToDOM({ text: `✨ Bienvenido a MILUCHAT, ${username}. ¡Comienza a conversar!`, timestamp: Date.now() }, false, true);
                }, 500);
            } else {
                errorMsg.innerText = errMsg;
                localStorage.removeItem('miluchat_username');
            }
        });
    }
    const savedUser = localStorage.getItem('miluchat_username');
    if (savedUser) joinChat(savedUser);
    joinBtn.addEventListener('click', () => {
        const name = usernameInput.value.trim();
        if (!name) errorMsg.innerText = 'Ingresa un nombre';
        else joinChat(name);
    });
    usernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') joinBtn.click();
    });
</script>
</body>
</html>
